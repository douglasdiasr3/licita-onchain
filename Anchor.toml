[toolchain]
anchor_version = "1.0.2"

[features]
resolution = true
skip-lint = false

[programs.devnet]
licita_onchain = "7Kob7MLNcumNP9irCTPqY2H3iRF8nPuVXxU2JX1MDm7s"

[programs.localnet]
licita_onchain = "7Kob7MLNcumNP9irCTPqY2H3iRF8nPuVXxU2JX1MDm7s"

[provider]
cluster = "Devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[hooks]

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "127.0.0.1"
url = "https://api.devnet.solana.com"
ledger = ".anchor/test-ledger"
rpc_port = 8899
